[www]
user = appuser
group = appgroup
listen = 9000
listen.owner = appuser
listen.group = appgroup
listen.mode = 0666

pm = dynamic
pm.max_children = 20
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 4
pm.max_requests = 500

; Logging
php_admin_value[error_log] = /var/log/php-fpm.log
php_admin_flag[log_errors] = on

catch_workers_output = yes