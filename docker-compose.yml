services:
    db:
        image: mariadb:10.11
        restart: unless-stopped
        environment:
            MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-demo-root-password}
            MARIADB_DATABASE: ${DB_DATABASE:-app}
            MARIADB_USER: ${DB_USERNAME:-app_user}
            MARIADB_PASSWORD: ${DB_PASSWORD:-demo-db-password}
            TZ: Europe/Kyiv
        ports:
            - "3309:3306"
        volumes:
            - ./docker/db/data:/var/lib/mysql
            - ./docker/db/init:/docker-entrypoint-initdb.d

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        command: ["redis-server", "--appendonly", "yes"]
        ports:
            - "${FORWARD_REDIS_PORT:-6382}:6379"
        volumes:
            - ./docker/redis/data:/data

    mailpit:
        image: axllent/mailpit:latest
        restart: unless-stopped
        ports:
            - "1025:1025"
            - "8025:8025"

    php:
        build:
            context: ./docker/php
            args:
                WWWUSER: ${WWWUSER:-1000}
                WWWGROUP: ${WWWGROUP:-1000}
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html
        environment:
            APP_ENV: ${APP_ENV:-local}
            APP_DEBUG: ${APP_DEBUG:-true}
            APP_URL: ${APP_URL:-http://127.0.0.1:8011}
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ${DB_DATABASE:-app}
            DB_USERNAME: ${DB_USERNAME:-app_user}
            DB_PASSWORD: ${DB_PASSWORD:-demo-db-password}
            REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
            REDIS_HOST: redis
            REDIS_PORT: 6379
            MAIL_MAILER: smtp
            MAIL_HOST: mailpit
            MAIL_PORT: 1025
            CACHE_STORE: ${CACHE_STORE:-redis}
            SESSION_DRIVER: ${SESSION_DRIVER:-redis}
            QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
        depends_on:
            - db
            - redis
            - mailpit

    nginx:
        image: nginx:1.27-alpine
        restart: unless-stopped
        depends_on:
            - php
        ports:
            - "8011:80"
            - "8445:443"
        volumes:
            - ./:/var/www/html:ro
            - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
